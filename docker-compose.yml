services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile

  worker:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps
    command: ["php", "bin/console", "messenger:consume", "internal-async", "--time-limit=3600"]

  backup:
    image: restic/restic:0.19.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      RESTIC_REPOSITORY: /backup/repo
      RESTIC_PASSWORD_FILE: /backup/restic-password
    volumes:
      - app_data:/data/app:ro
      - backup_repo:/backup
    entrypoint: ["sh", "/scripts/entrypoint.sh"]
    configs:
      - source: backup_entrypoint
        target: /scripts/entrypoint.sh
      - source: backup_run
        target: /scripts/run.sh

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/db
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/app
  caddy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/caddy
  backup_repo:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/backups

configs:
  caddy_config:
    content: |
      {
        ${ACME_EMAIL:+email ${ACME_EMAIL}}
      }

      ${DOMAIN:-:80} {
        reverse_proxy app:8888
      }
  backup_entrypoint:
    content: |
      #!/bin/sh
      set -eu
      apk add --no-cache mariadb-client >/dev/null

      mkdir -p /backup/repo
      if [ ! -f /backup/restic-password ]; then
        echo "No restic password file found, generating one..."
        head -c 32 /dev/urandom | base64 > /backup/restic-password
        chmod 600 /backup/restic-password
      fi

      echo "0 3 * * * sh /scripts/run.sh >>/proc/1/fd/1 2>>/proc/1/fd/2" > /etc/crontabs/root
      echo "Backup cron installed (daily at 03:00 container time)."
      exec crond -f -d 8
  backup_run:
    content: |
      #!/bin/sh
      set -eu
      DUMP_DIR=/tmp/dump
      rm -rf "$$DUMP_DIR"
      mkdir -p "$$DUMP_DIR"

      echo "Dumping database..."
      mariadb-dump -h "$$DB_HOST" -u"$$DB_USER" -p"$$DB_PASSWORD" "$$DB_NAME" > "$$DUMP_DIR/db.sql"

      if ! restic snapshots >/dev/null 2>&1; then
        echo "No existing restic repository found, initializing..."
        restic init
      fi

      echo "Backing up database dump and app data..."
      restic backup "$$DUMP_DIR" /data/app --tag xivarricrm

      echo "Pruning old snapshots..."
      restic forget --keep-daily 7 --keep-weekly 4 --keep-monthly 6 --prune

      rm -rf "$$DUMP_DIR"
      echo "Backup complete."
