services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    configs:
      - source: envoy_config
        target: /etc/envoy/envoy.yaml

  worker:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps
    command: ["php", "bin/console", "messenger:consume", "internal-async", "--time-limit=3600"]

volumes:
  db_data:
  app_data:

configs:
  envoy_config:
    content: |
      static_resources:
        listeners:
          - name: app_ingress
            address:
              socket_address: { address: 0.0.0.0, port_value: 80 }
            filter_chains:
              - filters:
                  - name: envoy.filters.network.http_connection_manager
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                      stat_prefix: ingress_http
                      route_config:
                        name: local_route
                        virtual_hosts:
                          - name: suitecrm
                            domains: ["*"]
                            routes:
                              - match: { prefix: "/" }
                                route: { cluster: suitecrm_app }
                      http_filters:
                        - name: envoy.filters.http.router
                          typed_config:
                            "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

        clusters:
          - name: suitecrm_app
            connect_timeout: 5s
            type: STRICT_DNS
            lb_policy: ROUND_ROBIN
            load_assignment:
              cluster_name: suitecrm_app
              endpoints:
                - lb_endpoints:
                    - endpoint:
                        address:
                          socket_address: { address: app, port_value: 8888 }

      admin:
        address:
          socket_address: { address: 127.0.0.1, port_value: 9901 }
