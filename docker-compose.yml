services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
    configs:
      - source: caddy_config
        target: /etc/caddy/Caddyfile

  worker:
    image: ghcr.io/jordi-adell/xivarricrm:latest
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SUITECRM_ADMIN_USER: ${SUITECRM_ADMIN_USER}
      SUITECRM_ADMIN_PASSWORD: ${SUITECRM_ADMIN_PASSWORD}
      SITE_URL: ${SITE_URL}
      DEMO_DATA: ${DEMO_DATA}
    volumes:
      - app_data:/apps
    command: ["php", "bin/console", "messenger:consume", "internal-async", "--time-limit=3600"]

volumes:
  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/db
  app_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/app
  caddy_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/caddy

configs:
  caddy_config:
    content: |
      {
        ${ACME_EMAIL:+email ${ACME_EMAIL}}
      }

      ${DOMAIN:-:80} {
        reverse_proxy app:8888
      }
